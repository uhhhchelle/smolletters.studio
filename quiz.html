function getShareText(result) {
  return `My mum is ${result.title}! ${result.subtitle} 💐 What flower is YOUR mum? Take the quiz:`;
}

function shareWhatsApp(result) {
  const text = encodeURIComponent(getShareText(result) + "\n" + window.location.href);
  window.open(`https://wa.me/?text=${text}`, '_blank');
}

function shareTelegram(result) {
  const text = encodeURIComponent(getShareText(result));
  const url = encodeURIComponent(window.location.href);
  window.open(`https://t.me/share/url?url=${url}&text=${text}`, '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 Copy link';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function render() {
  const app = document.getElementById('app');
  
  if (!started) {
    app.innerHTML = `
      <div class="start-screen">
        <div class="flower-icon">💐</div>
        <h1>What flower is <em>your mum</em>?</h1>
        <p>Take 30 seconds to discover her flower personality.</p>
        <button class="btn-start" onclick="startQuiz()">Find her flower</button>
        <div class="start-hint">6 questions · no sign-up needed</div>
      </div>
    `;
    return;
  }

  if (currentQ < questions.length) {
    const q = questions[currentQ];
    app.innerHTML = `
      <div class="question-screen">
        <div class="progress-bar">
          ${questions.map((_, i) => `<div class="progress-dot ${i < currentQ ? 'done' : ''} ${i === currentQ ? 'active' : ''}"></div>`).join('')}
        </div>
        <div class="q-number">Question ${currentQ + 1} of ${questions.length}</div>
        <div class="q-text">${q.text}</div>
        <div class="options">
          ${q.options.map((opt, i) => `
            <button class="option-btn" onclick="selectOption('${opt.type}')">
              <span class="emoji">${opt.emoji}</span>
              <span>${opt.text}</span>
            </button>
          `).join('')}
        </div>
      </div>
    `;
    return;
  }

  const counts = {};
  answers.forEach(a => { counts[a] = (counts[a] || 0) + 1; });
  const resultType = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  const result = results[resultType];

  app.innerHTML = `
    <div class="result-screen ${result.theme}">
      <div class="result-badge">Your mum's flower personality</div>
      <div class="result-flower-icon">${result.icon}</div>
      <div class="result-title">${result.title}</div>
      <div class="result-subtitle">${result.subtitle}</div>
      <div class="result-description">${result.description}</div>
      
      <div class="share-section">
        <div class="share-prompt">Send this to your siblings — do they agree? 😂</div>
        <div class="share-buttons">
          <button class="share-btn" onclick="shareWhatsApp(results['${resultType}'])">💬 WhatsApp</button>
          <button class="share-btn" onclick="shareTelegram(results['${resultType}'])">✈️ Telegram</button>
          <button class="share-btn" id="copyBtn" onclick="copyLink()">🔗 Copy link</button>
        </div>
      </div>

      <div class="result-flowers">
        <h3>If she were a bouquet:</h3>
        <div class="flower-list">
          ${result.flowers.map(f => `
            <div class="flower-item">
              <div class="dot" style="background: ${f.color}"></div>
              <div>
                <span class="label">${f.name}</span>
                <span class="detail"> — ${f.detail}</span>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="colour-palette">
          ${result.palette.map(c => `<div class="colour-swatch" style="background: ${c}"></div>`).join('')}
        </div>
      </div>

      <div class="cta-section">
        <div class="cta-eyebrow">Mother's Day 2026 · 10 May</div>
        <h3>We're making this bouquet for real.</h3>
        <p>Join our Mother's Day flower bar — take the quiz with your mum, build her personality bouquet together, and enjoy a drink on us.</p>
        <div class="cta-details">
          Workshop + drink from $45 · Grab & go from $30<br>
          Limited slots available
        </div>
        <a href="${EVENTBRITE_URL}" target="_blank" class="btn-book">Book your slot →</a>
      </div>
      
      <div class="retake-section">
        <button class="btn-restart" onclick="restart()">Take it again</button>
        <div class="retake-hint">Try for your stepmum, mother-in-law, or grandma!</div>
      </div>
      
      <div class="smolletters-footer">
        a <a href="index.html" style="color:inherit;">smol letters</a> pop-up
      </div>
    </div>
  `;
}

function startQuiz() {
  started = true;
  currentQ = 0;
  answers = [];
  render();
}

function selectOption(type) {
  answers.push(type);
  currentQ++;
  render();
}

function restart() {
  started = false;
  currentQ = 0;
  answers = [];
  window.scrollTo(0, 0);
  render();
}

render();
</script>
</body>
</html>
